name: CI

on:
  push:
    branches:
      - master
      - main
      - pr-54
      - pr-54-restacked
      - pr-54-review
      - wanman/**
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: CI / Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: CI / Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest coverage
        run: npm run coverage

  build:
    name: CI / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
