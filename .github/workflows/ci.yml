name: CI

on:
  push:
    branches:
      - master
      - main
      - wanman/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: CI / Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: CI / Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest coverage
        run: npm run coverage

  build:
    name: CI / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

  # Simulates the post-merge state by starting from the PR head commit and
  # merging the target base branch before building.
  # Catches TypeScript errors and build failures that only appear after merging
  # (e.g. duplicate object literal keys from changes in two different PRs).
  merge-simulation-build:
    name: CI / Merge-Simulation Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: website
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Simulate merge with base branch
        run: |
          git config user.email "ci@consultthedead.com"
          git config user.name "CI Bot"
          git fetch origin ${{ github.base_ref }}
          git merge origin/${{ github.base_ref }} --no-commit --no-ff || {
            echo "::error::Merge conflict detected with ${{ github.base_ref }} - resolve conflicts before merging."
            exit 1
          }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run build (merged state)
        run: npm run build

  framework-placeholder-citations:
    name: CI / Framework Citation Guardrail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: python -m pip install -e .[dev]

      - name: Validate framework citations
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            base_sha="${{ github.event.before }}"
          fi
          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            base_sha="$(git rev-parse HEAD^)"
          fi

          mapfile -t changed_jsons < <(
            git diff --name-only "$base_sha" HEAD -- frameworks \
              | grep '\.json$' || true
          )

          if [ "${#changed_jsons[@]}" -eq 0 ]; then
            echo "No framework JSON files changed; skipping placeholder validation."
            exit 0
          fi

          # Normalize each changed JSON to its framework root (frameworks/<slug>)
          # so nested artifacts (e.g. .../incidents/incidents.json) still resolve
          # to the directory that owns framework.json, and unrelated dirty
          # subtrees inherited from a stale base_sha do not get scanned as
          # standalone roots.
          declare -A target_dirs=()
          targets=()
          for file in "${changed_jsons[@]}"; do
            root="$(echo "$file" | awk -F/ '{ if (NF >= 2) print $1"/"$2 }')"
            if [ -z "$root" ]; then
              continue
            fi
            if [ ! -f "$root/framework.json" ]; then
              echo "Skipping $root: no framework.json manifest at framework root."
              continue
            fi
            if [ -z "${target_dirs[$root]:-}" ]; then
              target_dirs["$root"]=1
              targets+=("$root")
            fi
          done

          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No framework roots with framework.json among changed files; skipping placeholder validation."
            exit 0
          fi

          python -m framework_forge.validation.placeholder_citations "${targets[@]}"
